<!DOCTYPE html>
<html>
<head>
  <title>Product Page</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 40px;
      padding: 20px;
    }

    /* LEFT IMAGE COLUMN */
    .images {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .images img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 1px solid #ccc;
    }

    /* RIGHT CONTENT */
    .content {
      max-width: 600px;
    }

    textarea {
      width: 100%;
      height: 80px;
    }

    .review {
      border-bottom: 1px solid #ddd;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- LEFT: 6 IMAGES -->
<div class="images">
  <img src="https://via.placeholder.com/120">
  <img src="https://via.placeholder.com/120">
  <img src="https://via.placeholder.com/120">
  <img src="https://via.placeholder.com/120">
  <img src="https://via.placeholder.com/120">
  <img src="https://via.placeholder.com/120">
</div>

<!-- RIGHT: REVIEWS -->
<div class="content">
  <h2>Leave a Review</h2>

  <input id="name" placeholder="Your name"><br><br>

  <select id="rating">
    <option value="5">⭐⭐⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="2">⭐⭐</option>
    <option value="1">⭐</option>
  </select><br><br>

  <textarea id="comment" placeholder="Write your message"></textarea><br><br>

  <button onclick="submitReview()">Submit</button>

  <h3>Reviews</h3>
  <div id="reviews"></div>
</div>

<!-- Your app script -->
<script type="module" src="app.js"></script>
</body>
</html>
