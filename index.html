<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com: Limited Edition Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.elfsight.com/platform/platform.js" data-use-service-core defer></script>
    <style>
        body { font-family: "Amazon Ember", Arial, sans-serif; }
        .amzn-orange { color: #e47911; }
        .amzn-btn-yellow { background: #ffd814; border: 1px solid #fcd200; border-radius: 20px; }
        .amzn-btn-orange { background: #ffa41c; border: 1px solid #ff8f00; border-radius: 20px; }
    </style>
</head>
<body class="bg-white p-4">
    <div class="max-w-6xl mx-auto mb-6">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon" class="h-8 mb-4">
    </div>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-8">
        <div class="w-full md:w-2/5">
            <img src="https://via.placeholder.com/600x600?text=Your+Product+Photo" alt="Product" class="w-full sticky top-4">
        </div>

        <div class="w-full md:w-2/5">
            <h1 class="text-2xl font-medium leading-tight mb-1">Your Custom Product Name</h1>
            <p class="text-blue-600 text-sm hover:underline cursor-pointer mb-2">Brand: Your Name</p>
            <div class="flex items-center mb-4">
                <span class="amzn-orange text-lg">★★★★★</span>
                <span class="text-blue-600 text-sm ml-2 hover:underline cursor-pointer">842 ratings</span>
            </div>
            <hr class="mb-4">
            <div class="flex items-baseline gap-2 mb-4">
                <span class="text-sm align-top mt-1">$</span>
                <span class="text-2xl font-medium">19</span>
                <span class="text-sm align-top mt-1">99</span>
            </div>
            <p class="text-sm font-bold">About this item:</p>
            <ul class="list-disc ml-5 text-sm space-y-1 mt-2">
                <li>Customized specifically for you.</li>
                <li>High-quality finish and design.</li>
                <li>Perfect for gifting to friends and family.</li>
            </ul>
        </div>

        <div class="w-full md:w-1/5 border border-gray-300 rounded-lg p-4 h-fit">
            <p class="text-xl mb-4">$19.99</p>
            <p class="text-sm text-green-700 font-bold mb-4">In Stock</p>
            <button class="w-full amzn-btn-yellow py-2 text-sm mb-2 shadow-sm">Add to Cart</button>
            <button class="w-full amzn-btn-orange py-2 text-sm shadow-sm">Buy Now</button>
            <p class="text-xs text-gray-500 mt-4">Ships from: Your House</p>
            <p class="text-xs text-gray-500">Sold by: Your Name</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto mt-12 border-t pt-8">
        <h2 class="text-2xl font-bold mb-6">Customer reviews</h2>
        
        <div class="elfsight-app-4fd95cb9-db39-4fc2-b92d-4daf055a65ee" data-elfsight-app-lazy></div>
        
    </div>
</body>
</html>
